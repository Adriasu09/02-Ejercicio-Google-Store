<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Store</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./img/google-logo.png" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./styles/style.css" />

    <!-- Google Fonts: preconnect improves load performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- ===================== NAVIGATION ===================== -->
    <nav>
      <div class="links_contain">
        <img src="img/google-logo.png" alt="logo" />
        <ul class="links">
          <li><a href="#">Phones</a></li>
          <li><a href="./pages/earbuds.html">Earbuds</a></li>
          <li><a href="./pages/watches.html">Watches</a></li>
          <li><a href="#">Smart Home</a></li>
          <li><a href="#">Accessories</a></li>
          <li><a href="#">Subscriptions</a></li>
        </ul>
      </div>
      <ul class="icons">
        <li>
          <a href="#"><img src="img/icons/Search.svg" alt="buscador" /></a>
        </li>
        <li>
          <a href="#"><img src="img/icons/Help.svg" alt="ayuda" /></a>
        </li>
        <li class="cart-icon">
          <a href="#"><img src="img/icons/Cart.svg" alt="carrito" /></a>
        </li>
        <li>
          <a href="#"><img src="img/icons/Avatar.svg" alt="usuario" /></a>
        </li>
        <li class="menu">
          <a href="#"><img src="img/icons/icons-menu.svg" alt="usuario" /></a>
        </li>
      </ul>
    </nav>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main>
      <h1>Earbuds & Watches</h1>
      <div class="card_container">
        <article data-href="./pages/earbuds.html">
          <div class="img_container">
            <img src="./img/earbuds/earbuds_01.png" alt="earbuds_01" />
          </div>
          <div class="info_container">
            <div class="info">
              <h2>Google Pixel Buds Pro</h2>
              <p>Music & Sound</p>
            </div>
            <h2>229 €</h2>
            <button class="add_to_cart">Add to Cart</button>
          </div>
        </article>
        <article data-href="./pages/watches.html">
          <div class="img_container">
            <img
              src="./img/smartwatch/smartwatch_black.png"
              alt="smartwatch_black"
            />
          </div>
          <div class="info_container">
            <div class="info">
              <h2>Fitbit Inspire 3</h2>
              <p>Health & Fitness Tracker</p>
            </div>
            <h2>99,95 €</h2>
            <button class="add_to_cart">Add to Cart</button>
          </div>
        </article>
      </div>
    </main>

    <!-- ===================== FOOTER ===================== -->
    <footer>
      <div>
        <!-- Social media links -->
        <div class="social-icons">
          <a href="#"><img src="./img/icons/SM-x.svg" alt="X" /></a>
          <a href="#"
            ><img src="./img/icons/SM-instagram.svg" alt="Instagram"
          /></a>
          <a href="#"
            ><img src="./img/icons/SM-facebook.svg" alt="Facebook"
          /></a>
          <a href="#"><img src="./img/icons/SM-youtube.svg" alt="YouTube" /></a>
          <a href="#"><img src="./img/icons/SM-tiktok.svg" alt="TikTok" /></a>
        </div>

        <!-- Legal links and country selector -->
        <div class="footer-links">
          <a href="#">Privacy</a>
          <a href="#">Google Nest Commitment to Privacy</a>
          <a href="#">Sales Terms</a>
          <a href="#">Terms of Service</a>
          <div class="country">
            <img src="./img/icons/Spain.svg" alt="Spain" /> Spain
          </div>
        </div>
      </div>
    </footer>
  <script src="./app.js" defer></script>
  </body>
</html>
